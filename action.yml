name: "Refinery-RS Framework"
description: "All-in-one Rust compilation framework 🦀🏭"

inputs:
  binary_name:
    description: "The name of your project binary"
    required: true
  features:
    description: "Features to enable"
    required: false
    default: ""
  github_token:
    description: "GitHub token for releases"
    required: true
  linux_32bit:
    description: "Enable build for i686"
    required: false
    default: "false"
  linux_arm64:
    description: "Enable build for ARM64"
    required: false
    default: "false"
  linux_armv7:
    description: "Enable build for ARMv7"
    required: false
    default: "false"
  windows_32bit:
    description: "Enable build for Windows x86"
    required: false
    default: "false"
  windows_arm64:
    description: "Enable build for Windows ARM64"
    required: false
    default: "false"
  macos_x86:
    description: "Enable build for macOS Intel"
    required: false
    default: "false"
  linux_packaging:
    description: "Enable .deb and .rpm packaging for Linux"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Prepare Workspace 🧹
      shell: bash
      run: mkdir -p output

    - name: Build Orchestration 🏗️
      uses: sircesarium/refinery-rs/components/build@main
      with:
        binary_name: ${{ inputs.binary_name }}
        features: ${{ inputs.features }}
        linux_32bit: ${{ inputs.linux_32bit }}
        linux_arm64: ${{ inputs.linux_arm64 }}
        linux_armv7: ${{ inputs.linux_armv7 }}
        windows_32bit: ${{ inputs.windows_32bit }}
        windows_arm64: ${{ inputs.windows_arm64 }}
        macos_x86: ${{ inputs.macos_x86 }}
        linux_packaging: ${{ inputs.linux_packaging }}

    - name: Auto-Release 🏷️
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        target_commitish: ${{ github.sha }}
        files: output/*
        fail_on_unmatched_files: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
