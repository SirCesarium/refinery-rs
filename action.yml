name: "Refinery-RS Framework"
description: "All-in-one Rust compilation framework 🦀🏭"

inputs:
  mode:
    description: "Build mode: 'bin' for executables or 'lib' for shared/static libraries"
    required: false
    default: "bin"
  generate_headers:
    description: "Generate C headers using cbindgen (only for lib mode)"
    required: false
    default: "false"
  binary_name:
    description: "The name of your project binary"
    required: true
  features:
    description: "Features to enable"
    required: false
    default: ""
  github_token:
    description: "GitHub token for releases"
    required: true
  linux_32bit:
    description: "Enable build for i686"
    required: false
    default: "false"
  linux_arm64:
    description: "Enable build for ARM64"
    required: false
    default: "false"
  linux_armv7:
    description: "Enable build for ARMv7"
    required: false
    default: "false"
  windows_32bit:
    description: "Enable build for Windows x86"
    required: false
    default: "false"
  windows_arm64:
    description: "Enable build for Windows ARM64"
    required: false
    default: "false"
  macos_x86:
    description: "Enable build for macOS Intel"
    required: false
    default: "false"
  linux_packaging:
    description: "Enable .deb and .rpm packaging for Linux"
    required: false
    default: "false"
  windows_packaging:
    description: "Enable .msi packaging for Windows"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Get Refinery Version
      shell: bash
      run: echo "REFINERY_VERSION=${{ github.action_ref || 'main' }}" >> $GITHUB_ENV

    - name: Checkout Refinery
      uses: actions/checkout@v6
      with:
        repository: sircesarium/refinery-rs
        path: ./refinery
        ref: ${{ env.REFINERY_VERSION }}

    - name: Prepare Workspace 🧹
      shell: bash
      run: mkdir -p output

    - name: Build Orchestration 🏗️
      if: inputs.mode == 'bin'
      uses: ./refinery/components/build
      with:
        binary_name: ${{ inputs.binary_name }}
        features: ${{ inputs.features }}
        linux_32bit: ${{ inputs.linux_32bit }}
        linux_arm64: ${{ inputs.linux_arm64 }}
        linux_armv7: ${{ inputs.linux_armv7 }}
        windows_32bit: ${{ inputs.windows_32bit }}
        windows_arm64: ${{ inputs.windows_arm64 }}
        macos_x86: ${{ inputs.macos_x86 }}
        linux_packaging: ${{ inputs.linux_packaging }}
        windows_packaging: ${{ inputs.windows_packaging }}

    - name: Library Orchestration 📚
      if: inputs.mode == 'lib'
      uses: ./refinery/components/library
      with:
        binary_name: ${{ inputs.binary_name }}
        output_dir: "output"
        generate_headers: ${{ inputs.generate_headers }}
        target: ${{ runner.os == 'Windows' && 'x86_64-pc-windows-msvc' || (runner.os == 'macOS' && 'x86_64-apple-darwin' || 'x86_64-unknown-linux-musl') }}
        linux_32bit: ${{ inputs.linux_32bit }}
        linux_arm64: ${{ inputs.linux_arm64 }}
        linux_armv7: ${{ inputs.linux_armv7 }}
        windows_32bit: ${{ inputs.windows_32bit }}
        windows_arm64: ${{ inputs.windows_arm64 }}
        macos_x86: ${{ inputs.macos_x86 }}

    - name: Auto-Release 🏷️
      uses: softprops/action-gh-release@v3
      with:
        token: ${{ inputs.github_token }}
        tag_name: ${{ github.ref_name }}
        target_commitish: ${{ github.sha }}
        files: output/**/*
        fail_on_unmatched_files: false
        generate_release_notes: true
