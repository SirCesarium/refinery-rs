version: 2
updates:
  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # Maintain Rust dependencies (if you ever add Rust code to Refinery)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
