name: Refinery Pipeline
on:
  push:
    tags:
    - v*
permissions:
  pull-requests: write
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          use_cross: 'false'
        - os: ubuntu-latest
          use_cross: 'true'
          target: aarch64-unknown-linux-gnu
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          use_cross: 'true'
        - use_cross: 'true'
          os: ubuntu-latest
          target: aarch64-unknown-linux-musl
        - target: x86_64-pc-windows-msvc
          use_cross: 'false'
          os: windows-latest
        - use_cross: 'false'
          target: aarch64-pc-windows-msvc
          os: windows-latest
        - target: aarch64-apple-darwin
          os: macos-latest
          use_cross: 'false'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Install Packagers
      run: |-
        if [ "${{ runner.os }}" = "Windows" ]; then
          cargo install cargo-wix
        else
          cargo install cargo-deb cargo-generate-rpm
        fi
      shell: bash
    - name: Install Refinery
      run: cargo install --git https://github.com/SirCesarium/refinery-rs --no-default-features
      shell: bash
    - name: Install Cross
      run: curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
      if: ${{ matrix.use_cross == 'true' }}
      shell: bash
    - name: Build
      run: refinery build --target ${{ matrix.target }} --release
      shell: bash
    - name: 'Prepare Artifacts: refinery'
      run: |-
        mkdir -p dist
        if [ "${{ runner.os }}" = "Windows" ]; then
          find target -name "refinery.exe" -path "*/release/*" -exec cp {} dist/refinery-${{ matrix.target }}.exe \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.zip" -exec cp {} dist/ \; 2>/dev/null || true
        else
          find target -name "refinery" -path "*/release/*" -not -name "*.d" -exec cp {} dist/refinery-${{ matrix.target }} \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
        fi
        ls -R dist/
      shell: bash
    - name: 'Prepare Artifacts: refinery-build'
      run: |-
        mkdir -p dist
        if [ "${{ runner.os }}" = "Windows" ]; then
          find target -name "refinery-build.exe" -path "*/release/*" -exec cp {} dist/refinery-build-${{ matrix.target }}.exe \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.zip" -exec cp {} dist/ \; 2>/dev/null || true
        else
          find target -name "refinery-build" -path "*/release/*" -not -name "*.d" -exec cp {} dist/refinery-build-${{ matrix.target }} \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
        fi
        ls -R dist/
      shell: bash
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        path: dist/*
        name: artifact-${{ matrix.target }}
        if-no-files-found: error
  release:
    name: Release Artifacts
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        name: artifacts
        merge-multiple: 'true'
    - name: Publish Release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/*
