[package]
name = "refinery-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
console = "0.16.3"
inquire = "0.9.4"
miette = { version = "7.6.0", features = ["fancy"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_yaml = "0.9.34"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["full"] }
reqwest = { version = "0.13.2", features = ["json", "rustls"] }
toml_edit = "0.22.22"
semver = "1.0.26"
tempfile = "3.17.1"
