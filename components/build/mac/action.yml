name: 'Build Apple Silicon Binary'
description: 'Compiles the Rust binary for macOS ARM64 🍎'

inputs:
  binary_name:
    description: 'Name of the resulting binary'
    required: true
  features:
    description: 'Features to enable'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Install Target 🛠️
      shell: bash
      run: rustup target add aarch64-apple-darwin

    - name: Build Binary 🏗️
      shell: bash
      run: |
        if [ -z "${{ inputs.features }}" ]; then
          cargo build --release --target aarch64-apple-darwin
        else
          cargo build --release --target aarch64-apple-darwin --features "${{ inputs.features }}"
        fi

    - name: Prepare Artifact 📦
      shell: bash
      run: |
        mkdir -p output
        cp target/aarch64-apple-darwin/release/${{ inputs.binary_name }} output/