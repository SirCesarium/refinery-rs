name: "Build Linux Binary"
description: "Compiles Rust binaries for various Linux architectures using MUSL 🐧"

inputs:
  binary_name:
    description: "Name of the resulting binary"
    required: true
  features:
    description: "Features to enable"
    required: false
    default: ""
  target:
    description: "Rust target triple (e.g. i686-unknown-linux-musl)"
    required: false
    default: "x86_64-unknown-linux-musl"
  suffix:
    description: "Suffix for the output file (e.g. -linux, -linux-i686)"
    required: false
    default: "-linux"

runs:
  using: "composite"
  steps:
    - name: Install Linkers
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-i686-linux-gnu

    - name: Install Target 🛠️
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Build Binary 🏗️
      shell: bash
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
        CARGO_TARGET_I686_UNKNOWN_LINUX_MUSL_LINKER: i686-linux-gnu-gcc
      run: |
        if [ -z "${{ inputs.features }}" ]; then
          cargo build --release --target ${{ inputs.target }}
        else
          cargo build --release --target ${{ inputs.target }} --features "${{ inputs.features }}"
        fi

    - name: Prepare Artifact 📦
      shell: bash
      run: |
        mkdir -p output
        cp target/${{ inputs.target }}/release/${{ inputs.binary_name }} output/${{ inputs.binary_name }}${{ inputs.suffix }}
