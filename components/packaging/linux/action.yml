name: "Refinery-RS Linux Packager"
description: "Optimized .deb and .rpm generation"

inputs:
  binary_name:
    description: "The name of the binary to package"
    required: true
  output_dir:
    description: "Final directory for the packages"
    default: "output"

runs:
  using: "composite"
  steps:
    - name: Cache Packaging Tools 💾
      id: cache-packaging
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-packaging-tools-v2-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-packaging-tools-v2-
    
    - name: Add Cargo Bin to Path 🚀
      shell: bash
      run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install Packaging Tools 🛠️
      if: steps.cache-packaging.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cargo install cargo-deb --quiet
        cargo install cargo-generate-rpm --quiet

    - name: Create Output Directory
      shell: bash
      run: mkdir -p ${{ inputs.output_dir }}

    - name: Package .deb 📦
      shell: bash
      run: |
        cargo deb --no-build --target x86_64-unknown-linux-musl --output "${{ inputs.output_dir }}/${{ inputs.binary_name }}-linux.deb"

    - name: Package .rpm 📦
      shell: bash
      run: |
        cargo generate-rpm --target x86_64-unknown-linux-musl --output "${{ inputs.output_dir }}/${{ inputs.binary_name }}-linux.rpm"
