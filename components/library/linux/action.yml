name: "Refinery-RS Linux Library Builder"
description: "Builds and exports Linux shared objects and static archives"
inputs:
  binary_name:
    description: "The name of the library to build"
    required: true
  target:
    description: "The Rust target triple for the compilation"
    required: true
  output_dir:
    description: "Directory where the libraries will be stored"
    default: "output"
runs:
  using: "composite"
  steps:
    - name: Install musl-tools
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Build Multi-Arch Libraries
      shell: bash
      run: |
        TARGETS=("x86_64-unknown-linux-musl")
        if [ "${{ inputs.linux_32bit }}" == "true" ]; then TARGETS+=("i686-unknown-linux-musl"); fi
        if [ "${{ inputs.linux_arm64 }}" == "true" ]; then TARGETS+=("aarch64-unknown-linux-musl"); fi
        if [ "${{ inputs.linux_armv7 }}" == "true" ]; then TARGETS+=("armv7-unknown-linux-musleabihf"); fi

        for TARGET in "${TARGETS[@]}"; do
          echo "🏗️ Building for $TARGET..."
          rustup target add $TARGET
          cargo build --release --target $TARGET

          mkdir -p ${{ inputs.output_dir }}/lib/$TARGET

          if [ -f "target/$TARGET/release/lib${{ inputs.binary_name }}.so" ]; then
            cp "target/$TARGET/release/lib${{ inputs.binary_name }}.so" \
               "${{ inputs.output_dir }}/lib/$TARGET/lib${{ inputs.binary_name }}-$TARGET.so"
          fi

          if [ -f "target/$TARGET/release/lib${{ inputs.binary_name }}.a" ]; then
            cp "target/$TARGET/release/lib${{ inputs.binary_name }}.a" \
               "${{ inputs.output_dir }}/lib/$TARGET/lib${{ inputs.binary_name }}-$TARGET.a"
          fi
        done