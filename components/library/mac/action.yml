name: "Refinery-RS macOS Library Builder"
description: "Builds and exports macOS dynamic libraries and static archives"
inputs:
  binary_name:
    description: "The name of the library to build"
    required: true
  target:
    description: "The Rust target triple for the compilation"
    required: true
  output_dir:
    description: "Directory where the libraries will be stored"
    default: "output"
  macos_x86:
    description: "Build library for macOS Intel"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Build Multi-Arch macOS Libraries
      shell: bash
      run: |
        TARGETS=("aarch64-apple-darwin")
        if [ "${{ inputs.macos_x86 }}" == "true" ]; then TARGETS+=("x86_64-apple-darwin"); fi

        for TARGET in "${TARGETS[@]}"; do
          echo "🏗️ Building macOS for $TARGET..."
          rustup target add $TARGET
          
          cargo build --release --target $TARGET

          LIB_DIR="${{ inputs.output_dir }}/lib/$TARGET"
          mkdir -p "$LIB_DIR"

          cp target/$TARGET/release/lib${{ inputs.binary_name }}.dylib "$LIB_DIR/lib${{ inputs.binary_name }}-$TARGET.dylib" 2>/dev/null || echo "DYLIB not found"
          cp target/$TARGET/release/lib${{ inputs.binary_name }}.a "$LIB_DIR/lib${{ inputs.binary_name }}-$TARGET.a" 2>/dev/null || echo "A not found"
        done
